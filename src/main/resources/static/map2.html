<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dragon Monster Adventure - Battle Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; background-color: #1a1a1a; image-rendering: pixelated; }
            
        /* UI Status Atas */
        #ui-status {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px;
            border-left: 5px solid #e67e22; pointer-events: none;
        }

        /* Battle Overlay */
        #battle-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; font-family: 'Courier New', Courier, monospace;
        }

        #combo-box {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0,0,0,0.8); border: 2px solid #f1c40f;
            padding: 10px 20px; color: white;
        }

        .skill-menu {
            background: #465a61; border: 4px solid #2c3e50;
            width: 500px; border-radius: 4px; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .skill-header {
            background: #2c3e50; color: white; padding: 5px;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }

        .skill-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; border-bottom: 2px solid #2c3e50;
            color: white; cursor: pointer; transition: background 0.2s;
        }

        .skill-item:hover { background: #5d7a85; }
        .skill-item.selected { background: #34495e; border-left: 5px solid #f1c40f; }

        .skill-name { display: flex; align-items: center; gap: 15px; font-weight: bold; }
        .skill-icon { width: 24px; height: 24px; background: #95a5a6; border-radius: 4px; }

        .battle-container {
            background: #2c3e50; padding: 40px; border-radius: 20px;
            border: 4px solid #e67e22; text-align: center; width: 450px;
        }
        .hp-bar-container {
            width: 100%; height: 25px; background: #7f8c8d; border-radius: 12px;
            margin: 10px 0; overflow: hidden; border: 2px solid #ecf0f1;
        }
        .hp-fill { height: 100%; background: #2ecc71; transition: width 0.4s ease-out; }
        .monster-hp { background: #e74c3c; }
        
        .battle-btns { margin-top: 25px; }
        .btn {
            background: #e67e22; border: none; color: white; padding: 12px 30px;
            font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 8px;
            margin: 0 10px; transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.1); background: #d35400; }
        #battle-log { margin-top: 20px; font-style: italic; color: #f1c40f; min-height: 24px; }


    </style>
</head>
<body>

<div id="ui-status">
    <h2 id="display-name">Memuat Petualang...</h2>
    <p>Gunakan <b>A / D</b> untuk jalan, <b>Space</b> untuk Lompat</p>
</div>

<div id="battle-screen">

    <div id="combo-box">
        <h2 style="margin:0; color: #f1c40f;">Combo: <span id="combo-count">0</span></h2>
        <p style="margin:0; font-size: 14px;">Damage: <span id="dmg-boost">100</span>%</p>
    </div>

    <div class="skill-menu">
        <div class="skill-header">
            <span>[A]</span> <b>Switch Monster</b> <span>[D]</span>
        </div>

        <div class="skill-item" onclick="useSkill('Claws', 50)">
            <div class="skill-name"><div class="skill-icon" style="background: #e74c3c;"></div> Claws</div>
            <div class="skill-val">50 💧</div>
        </div>

        <div class="skill-item" onclick="useSkill('Ice Hail', 40)">
            <div class="skill-name"><div class="skill-icon" style="background: #3498db;"></div> Ice Hail</div>
            <div class="skill-val">40 💧</div>
        </div>

        <div class="skill-item" onclick="useSkill('Air Sickle', 50)">
            <div class="skill-name"><div class="skill-icon" style="background: #2ecc71;"></div> Air Sickle</div>
            <div class="skill-val">50 💧</div>
        </div>
    </div>

    <div id="battle-log" style="color: white; margin-top: 20px; background: rgba(0,0,0,0.5); padding: 5px 20px;">
        Menunggu giliran...
    </div>


    <div class="battle-container">
        <h1 id="m-name" style="color: #e74c3c;">MONSTER</h1>
        <div class="hp-bar-container">
            <div id="m-hp-fill" class="hp-fill monster-hp" style="width: 100%;"></div>
        </div>
        <p>HP Monster: <span id="m-hp-text">100/100</span></p>

        <hr style="margin: 30px 0; border: 1px solid #7f8c8d;">

        <h2 id="p-name" style="color: #3498db;">PLAYER</h2>
        <div class="hp-bar-container">
            <div id="p-hp-fill" class="hp-fill" style="width: 100%;"></div>
        </div>
        <p>HP Kamu: <span id="p-hp-text">100/100</span></p>

        <div class="battle-btns">
            <button class="btn" onclick="performAttack()">SERANG!</button>
            <button class="btn" style="background: #95a5a6;" onclick="attemptEscape()">LARI</button>
        </div>
        <p id="battle-log"></p>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script src="js/map2.js" defer></script>
</body>
</html>
