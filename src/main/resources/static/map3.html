<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Vyrn: Dragon Monster Adventure - Linear Level</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; background-color: #1a1a1a; }
        
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; z-index: 10; }

        /* --- UI BATTLE OVERLAY --- */
        #battle-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85); /* Background gelap transparan */
            display: none; /* Sembunyi secara default */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
        }

        .battle-panel {
            background: #2c3e50;
            padding: 30px;
            border: 4px solid #ecf0f1;
            border-radius: 15px;
            text-align: center;
            min-width: 400px;
        }

        .hp-bar-container {
            width: 100%;
            height: 25px;
            background: #444;
            border-radius: 12px;
            margin: 10px 0;
            overflow: hidden;
            border: 2px solid #000;
        }

        #m-hp-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, #ff4d4d, #ff0000);
            transition: width 0.3s ease;
        }

        #battle-log {
            background: #1a1a1a;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            font-style: italic;
            color: #f1c40f;
            min-height: 20px;
        }

        .btn-attack {
            background: #e67e22;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 10px;
            transition: transform 0.1s;
        }

        .btn-attack:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div id="ui">
    <div id="msg">Gunakan A/D untuk bergerak, W untuk lompat. Kalahkan musuh untuk lanjut!</div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="battle-screen">
    <div class="battle-panel">
        <h1 id="m-name">Monster Liar</h1>
        
        <div class="hp-bar-container">
            <div id="m-hp-fill"></div>
        </div>
        <div id="m-hp-text">100 / 100</div>

        <hr style="width: 100%; border: 1px solid #555; margin: 20px 0;">

        <div id="battle-log">Monster menghadang! Siapkan naga kamu!</div>

        <button class="btn-attack" onclick="attackClick()">SERANG!</button>
    </div>
</div>

<script src="js/map3.js"></script>

</body>
</html>
